<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daily Work Log</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:20px;
    background:#2f2f2f;
    color:#f0f0f0;
}

h1{
    margin-top:0;
}

.controls{
    margin-bottom:20px;
}

input{
    padding:6px;
}

button{
    padding:6px 12px;
    margin-right:5px;
    cursor:pointer;
}

.bottom-controls{
    margin-top:20px;
    padding:12px;
    background:#3b3b3b;
    border-radius:8px;
}

.bottom-controls label,
.bottom-controls select{
    color:#f0f0f0;
}

.bottom-controls select{
    margin-left:10px;
    padding:6px;
    background:#2f2f2f;
    border:1px solid #555;
    color:#f0f0f0;
}

table{
    border-collapse:collapse;
    width:100%;
    background:white;
    color:#000;
}

tbody tr{
    border-bottom:2px solid #d1d1d1;
}

th,td{
    border:1px solid #000000;
    padding:8px;
}

th{
    background:#333;
    color:white;
}

.deleteBtn{
    background:#d9534f;
    color:rgb(255, 255, 255);
    border:none;
}
</style>
</head>

<body>

<h1>Daily Work Log</h1>

<div class="controls">

<label>Date:</label>
<input type="date" id="logDate">

<br><br>

<label>Job #</label>
<input id="jobInput">

<label>Description</label>
<input id="descInput" style="width:400px;">

<button onclick="addEntry()">Add Entry</button>

<button onclick="copyTable()">Copy Table For OneNote</button>

<button onclick="exportData()">Export Backup</button>

<input type="file" id="importFile" onchange="importData(event)">

</div>

<table id="logTable">

<thead>
<tr>
<th>Time</th>
<th>Job</th>
<th>Description</th>
<th>Delete</th>
</tr>
</thead>

<tbody></tbody>

</table>

<div class="bottom-controls">
    <label for="backgroundColor">Page background:</label>
    <select id="backgroundColor">
        <option value="#2f2f2f">Dark Gray</option>
        <option value="#121212">Black</option>
        <option value="#ffffff">White</option>
        <option value="#3b3b3b">Charcoal</option>
        <option value="#2a2a3d">Midnight</option>
        <option value="#2a3b2a">Forest</option>
    </select>
</div>

<script>

const STORAGE_KEY = "dailyWorkLog";
const jobColors = new Map();
const backgroundColorSelector = document.getElementById("backgroundColor");

function updateBodyTextColor(){
    const bg = backgroundColorSelector.value;
    const rgb = parseInt(bg.slice(1), 16);
    const r = (rgb >> 16) & 255;
    const g = (rgb >> 8) & 255;
    const b = rgb & 255;
    const brightness = (r * 299 + g * 587 + b * 114) / 1000;
    document.body.style.color = brightness > 160 ? "#000" : "#f0f0f0";
}

function setPageBackground(color){
    document.body.style.backgroundColor = color;
    updateBodyTextColor();
}

backgroundColorSelector.addEventListener("change", () => {
    setPageBackground(backgroundColorSelector.value);
});

setPageBackground(backgroundColorSelector.value);

document.getElementById("logDate").value =
new Date().toISOString().split("T")[0];

loadData();

document.getElementById("descInput")
    .addEventListener("keydown", event => {
        if (event.key === "Enter") {
            event.preventDefault();
            addEntry();
        }
    });

function getCurrentTime(){

    let d = new Date();

    return d.toLocaleTimeString([],{
        hour:'numeric',
        minute:'2-digit'
    });
}

function hashColor(text){

    let hash = 2166136261;

    for(let i = 0; i < text.length; i++){
        hash ^= text.charCodeAt(i);
        hash = Math.imul(hash, 16777619) >>> 0;
    }

    const mixed = Math.imul(hash ^ (hash >>> 16), 0x45d9f3b) >>> 0;
    const hue = mixed % 360;
    const saturation = 65 + ((mixed >>> 8) % 20);
    const lightness = 72 + ((mixed >>> 16) % 12);

    return `hsl(${hue},${saturation}%,${lightness}%)`;
}

function getJobColor(job){
    if(!jobColors.has(job)){
        jobColors.set(job, hashColor(job));
    }
    return jobColors.get(job);
}

function addEntry(){

    const job = document.getElementById("jobInput").value.trim();
    const desc = document.getElementById("descInput").value.trim();

    if(!job) return;

    const tbody = document.querySelector("#logTable tbody");

    const row = createRow(
        getCurrentTime(),
        job,
        desc
    );

    tbody.appendChild(row);

    saveData();

    document.getElementById("descInput").value="";
}

function createRow(time,job,desc){

    const tr = document.createElement("tr");

    tr.style.backgroundColor = getJobColor(job);

    tr.innerHTML = `
        <td contenteditable="true">${time}</td>
        <td contenteditable="true">${job}</td>
        <td contenteditable="true">${desc}</td>
        <td>
            <button class="deleteBtn">X</button>
        </td>
    `;

    tr.querySelectorAll("[contenteditable]")
    .forEach(cell=>{
        cell.addEventListener("input",()=>{

            const updatedJob =
                tr.children[1].innerText;

            tr.style.backgroundColor =
                getJobColor(updatedJob);

            saveData();
        });
    });

    tr.querySelector(".deleteBtn")
    .addEventListener("click",()=>{

        tr.remove();
        saveData();

    });

    return tr;
}

function saveData(){

    const rows = [];

    document
    .querySelectorAll("#logTable tbody tr")
    .forEach(row=>{

        rows.push({

            time: row.children[0].innerText,
            job: row.children[1].innerText,
            desc: row.children[2].innerText

        });

    });

    const data = {

        date: document.getElementById("logDate").value,
        rows: rows

    };

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(data)
    );
}

function loadData(){

    const data =
    JSON.parse(localStorage.getItem(STORAGE_KEY));

    if(!data) return;

    document.getElementById("logDate").value =
        data.date;

    const tbody =
    document.querySelector("#logTable tbody");

    data.rows.forEach(r=>{

        tbody.appendChild(
            createRow(
                r.time,
                r.job,
                r.desc
            )
        );

    });
}

function copyTable(){

    const table =
        document.getElementById("logTable");

    const range =
        document.createRange();

    range.selectNode(table);

    const selection =
        window.getSelection();

    selection.removeAllRanges();
    selection.addRange(range);

    document.execCommand("copy");

    selection.removeAllRanges();

    alert("Table copied. Paste into OneNote.");
}

function exportData(){

    const data =
    localStorage.getItem(STORAGE_KEY);

    const blob =
    new Blob([data],{
        type:"application/json"
    });

    const a =
    document.createElement("a");

    a.href =
    URL.createObjectURL(blob);

    a.download =
    "worklog_backup.json";

    a.click();
}

function importData(event){

    const file =
    event.target.files[0];

    if(!file) return;

    const reader =
    new FileReader();

    reader.onload = function(e){

        localStorage.setItem(
            STORAGE_KEY,
            e.target.result
        );

        location.reload();
    };

    reader.readAsText(file);
}

document
.getElementById("logDate")
.addEventListener("change",saveData);

</script>

</body>
</html>
